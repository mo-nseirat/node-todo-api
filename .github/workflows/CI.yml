name: CI_On_Pull_Trigger

on: 
  pull_request:
    branches: 
      - main

jobs:

  lint:
    name: lint_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: 
          node-version: 20

      - run: npm install 
      - run: npm run lint 

  security: 
    name: sast_test
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3
 